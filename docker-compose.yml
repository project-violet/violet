services:
  hsync:
    build:
      context: ./fast-hsync
    image: violet/fast-hsync:local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[fast-hsync] starting scheduled sync"
          fast-hsync /data/data.db
          status=$$?
          if [ "$$status" -eq 0 ]; then
            echo "[fast-hsync] scheduled sync completed"
          else
            echo "[fast-hsync] scheduled sync failed with exit code $$status" >&2
          fi
          echo "[fast-hsync] next sync in $${HSYNC_INTERVAL_SECONDS}s"
          sleep "$${HSYNC_INTERVAL_SECONDS}"
        done
    environment:
      HSYNC_INTERVAL_SECONDS: ${HSYNC_INTERVAL_SECONDS:-3600}
      FAST_HSYNC_QUIET: "1"
    volumes:
      - ${VIOLET_DATA_ROOT:-./data}:/data
    init: true
    restart: unless-stopped

  message-search:
    build:
      context: ./violet-message-search
    image: violet/message-search:local
    command:
      - "0.0.0.0"
      - "12332"
      - "--data-paths"
      - "/data/merged-0.fscm"
    ports:
      - "12332:12332"
    volumes:
      - ${VIOLET_DATA_ROOT:-./data}:/data:ro
    restart: unless-stopped

  graph:
    build:
      context: ./violet-graph
    image: violet/graph:local
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--input"
      - "/data/graph.csv"
      - "--port"
      - "8787"
    ports:
      - "8787:8787"
    volumes:
      - ${VIOLET_DATA_ROOT:-./data}:/data:ro
    restart: unless-stopped

  web:
    build:
      context: ./violet-web
    image: violet/web:local
    environment:
      DATA_DB_PATH: /app/data/data.db
      USER_DB_PATH: /app/data/user.db
      FSCM_BASE_URL: http://message-search:12332
      KEYWORD_GRAPH_BASE_URL: http://graph:8787
      SYNC_ENABLED: "false"
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - ${VIOLET_DATA_ROOT:-./data}:/app/data
    depends_on:
      - message-search
      - graph
    restart: unless-stopped
