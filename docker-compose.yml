volumes:
  violet-content-db:
  violet-llm-index:
  violet-huggingface-cache:
  violet-llama-cache:

services:
  content-db-init:
    image: alpine:3.21
    command:
      - /bin/sh
      - -ec
      - |
          if [ -s /content-data/data.db ]; then
            exit 0
          fi
          cp /seed/data.db /content-data/data.db
          for suffix in -wal -shm; do
            if [ -f "/seed/data.db$$suffix" ]; then
              cp "/seed/data.db$$suffix" "/content-data/data.db$$suffix"
            fi
          done
    volumes:
      - ${VIOLET_DATA_ROOT:-./data}:/seed:ro
      - violet-content-db:/content-data
    restart: "no"

  hsync:
    build:
      context: ./fast-hsync
    image: violet/fast-hsync:local
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        while true; do
          echo "[fast-hsync] starting scheduled sync"
          fast-hsync /content-data/data.db
          status=$$?
          if [ "$$status" -eq 0 ]; then
            echo "[fast-hsync] scheduled sync completed"
          else
            echo "[fast-hsync] scheduled sync failed with exit code $$status" >&2
          fi
          echo "[fast-hsync] next sync in $${HSYNC_INTERVAL_SECONDS}s"
          sleep "$${HSYNC_INTERVAL_SECONDS}"
        done
    environment:
      HSYNC_INTERVAL_SECONDS: ${HSYNC_INTERVAL_SECONDS:-3600}
      FAST_HSYNC_QUIET: "1"
    volumes:
      - violet-content-db:/content-data
    depends_on:
      content-db-init:
        condition: service_completed_successfully
    init: true
    restart: unless-stopped

  message-search:
    build:
      context: ./violet-message-search
    image: violet/message-search:local
    command:
      - "0.0.0.0"
      - "12332"
      - "--data-paths"
      - "/data/merged-0.fscm"
    ports:
      - "12332:12332"
    volumes:
      - ${VIOLET_MESSAGE_SEARCH_DATA:-./violet-message-search/data/merged-0.fscm}:/data/merged-0.fscm:ro
    restart: unless-stopped

  graph:
    build:
      context: ./violet-graph
    image: violet/graph:local
    command:
      - "serve"
      - "--host"
      - "0.0.0.0"
      - "--input"
      - "/data/graph.csv"
      - "--port"
      - "8787"
    ports:
      - "8787:8787"
    volumes:
      - ${VIOLET_GRAPH_DATA:-./violet-graph/graph.csv}:/data/graph.csv:ro
    restart: unless-stopped

  llm-index-init:
    image: alpine:3.21
    command:
      - /bin/sh
      - -ec
      - |
          src="/seed/Qwen--Qwen3-Embedding-4B/$${OUTPUT_NAME}/$${INDEX_NAME}"
          if [ ! -f "$$src/manifest.json" ]; then
            echo "missing LLM index: $$src/manifest.json" >&2
            exit 1
          fi
          checksum="$$(sha256sum "$$src/manifest.json" | awk '{print $$1}')"
          if [ -f /index/.source-manifest.sha256 ] && [ "$$(cat /index/.source-manifest.sha256)" = "$$checksum" ]; then
            echo "LLM index volume is current"
            exit 0
          fi
          echo "copying LLM index into Docker volume"
          find /index -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          cp -a "$$src"/. /index/
          printf '%s\n' "$$checksum" > /index/.source-manifest.sha256
          echo "LLM index volume is ready"
    environment:
      OUTPUT_NAME: ${VIOLET_LLM_OUTPUT_NAME:-latest-5000}
      INDEX_NAME: ${VIOLET_LLM_INDEX_NAME:-index}
    volumes:
      - ${VIOLET_LLM_OUTPUT_ROOT:-./violet-llm/outputs}:/seed:ro
      - violet-llm-index:/index
    restart: "no"

  embedding-llama:
    image: ghcr.io/ggml-org/llama.cpp:${VIOLET_LLAMA_CPP_VERSION:-server-cuda-b10015}
    command:
      - -hf
      - ${VIOLET_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-4B-GGUF:Q5_K_M}
      - --embedding
      - --pooling
      - last
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --n-gpu-layers
      - "99"
      - --ctx-size
      - "2048"
      - --batch-size
      - "2048"
      - --ubatch-size
      - "2048"
    ports:
      - "${VIOLET_EMBEDDING_PORT:-8081}:8080"
    volumes:
      - violet-llama-cache:/root/.cache/huggingface
    gpus: all
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  reranker-vllm:
    image: vllm/vllm-openai:${VIOLET_VLLM_VERSION:-v0.25.1}
    command:
      - Qwen/Qwen3-Reranker-0.6B
      - --runner
      - pooling
      - --hf-overrides
      - '{"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
      - --chat-template
      - /templates/qwen3-reranker.jinja
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - ${VIOLET_RERANKER_GPU_MEMORY_UTILIZATION:-0.30}
    ports:
      - "${VIOLET_RERANKER_PORT:-8082}:8000"
    volumes:
      - violet-huggingface-cache:/root/.cache/huggingface
      - ./violet-llm/qwen3-reranker.jinja:/templates/qwen3-reranker.jinja:ro
    gpus: all
    ipc: host
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    restart: unless-stopped

  llm-search:
    build:
      context: ./violet-llm
    image: violet/llm-search:local
    environment:
      VIOLET_LLM_OUTPUT_ROOT: /data
      VIOLET_LLM_OUTPUT_NAME: ${VIOLET_LLM_OUTPUT_NAME:-latest-5000}
      VIOLET_LLM_INDEX_NAME: ${VIOLET_LLM_INDEX_NAME:-index}
      VIOLET_LLM_SEARCH_CONCURRENCY: ${VIOLET_LLM_SEARCH_CONCURRENCY:-1}
      VIOLET_EMBEDDING_URL: ${VIOLET_EMBEDDING_URL:-http://embedding-llama:8080/v1/embeddings}
      VIOLET_EMBEDDING_MODEL: ${VIOLET_EMBEDDING_MODEL:-Qwen/Qwen3-Embedding-4B-GGUF:Q5_K_M}
      VIOLET_RERANKER_URL: ${VIOLET_RERANKER_URL:-http://reranker-vllm:8000/v1/rerank}
      VIOLET_RERANKER_MODEL: ${VIOLET_RERANKER_MODEL:-Qwen/Qwen3-Reranker-0.6B}
      VIOLET_RERANKER_SEPARATE_INSTRUCTION: "true"
    ports:
      - "8788:8788"
    volumes:
      - ${VIOLET_LLM_OUTPUT_ROOT:-./violet-llm/outputs}:/data:ro
      - violet-llm-index:/data/Qwen--Qwen3-Embedding-4B/${VIOLET_LLM_OUTPUT_NAME:-latest-5000}/${VIOLET_LLM_INDEX_NAME:-index}:ro
    depends_on:
      llm-index-init:
        condition: service_completed_successfully
      embedding-llama:
        condition: service_healthy
      reranker-vllm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    init: true
    restart: unless-stopped

  web:
    build:
      context: ./violet-web
    image: violet/web:local
    environment:
      DATA_DB_PATH: /content-data/data.db
      USER_DB_PATH: /app/data/user.db
      FSCM_BASE_URL: http://message-search:12332
      KEYWORD_GRAPH_BASE_URL: http://graph:8787
      LLM_SEARCH_BASE_URL: http://llm-search:8788
      SYNC_ENABLED: "false"
      PORT: "3001"
    ports:
      - "3001:3001"
    volumes:
      - ./violet-web/packages/backend/data:/app/data
      - violet-content-db:/content-data
    depends_on:
      content-db-init:
        condition: service_completed_successfully
      message-search:
        condition: service_started
      graph:
        condition: service_started
    restart: unless-stopped
